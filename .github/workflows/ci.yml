name: CI Quality and Security Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  app-ci:
    name: App Test, Audit, Docker Build, Trivy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Run syntax check
        working-directory: app
        run: npm run lint

      - name: Run npm audit
        working-directory: app
        run: npm audit --audit-level=moderate

      - name: Build Docker image
        run: docker build --no-cache -t orders-api:ci ./app

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy image scan
        run: |
          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            orders-api:ci

  infrastructure-ci:
    name: Terraform, Kubernetes, and IaC Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Terraform fmt check
        run: terraform -chdir=terraform/environments/dev fmt -check

      - name: Terraform init without backend
        run: terraform -chdir=terraform/environments/dev init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/environments/dev validate

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate Kubernetes base manifests
        run: kubeconform -strict -summary k8s/base/*.yaml

      - name: Validate Kubernetes rollout manifests with CRD schemas ignored
        run: kubeconform -strict -ignore-missing-schemas -summary k8s/rollouts/*.yaml

      - name: Run Checkov Terraform scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/environments/dev
          quiet: true
